server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Catálogo
        - id: catalogo-productos
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/productos/**
        - id: catalogo-genero
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/genero/**
        - id: catalogo-tipos-prenda
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/tipos-prenda/**

        # Inventario
        - id: inventario-stock
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/stock/**

        # Carrito
        - id: carrito
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/carritos/**

        # Reservas
        - id: reservas
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/reservas/**

        # Logística
        - id: logistica
          uri: http://localhost:8085
          predicates:
            - Path=/api/v2/logistica/**
